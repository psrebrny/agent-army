name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build tarball
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          tar czf agent-army-${VERSION}.tar.gz \
            template/ install.sh README.md GUIDE.md CLAUDE.md LICENSE
          ls -lh agent-army-${VERSION}.tar.gz

      - name: Compute checksums
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          sha256sum agent-army-${VERSION}.tar.gz > agent-army-${VERSION}.tar.gz.sha256
          cat agent-army-${VERSION}.tar.gz.sha256

      - name: Create Release & Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            agent-army-*.tar.gz
            agent-army-*.tar.gz.sha256
          body: |
            **Install:** See [README.md](https://github.com/pawel-srebrny/agent-army#install-into-any-repo) for installation options.

            **Verify:** Check the `.sha256` file for integrity:
            ```bash
            sha256sum -c agent-army-*.tar.gz.sha256
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
