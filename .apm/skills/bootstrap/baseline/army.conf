# Agent Army — project policy (committed; shell-sourceable).
# Single source of truth for the configurable rigor of THIS repo. Sourced by the hooks
# (detect.sh) and summarized for the agents in CLAUDE.md. Set by /bootstrap, editable by hand.
#
# NOT configurable here (always-on, non-negotiable): the security barriers —
# secret-file blocking and dangerous-command blocking in guard.sh + git-pre-commit.sh.
# Those stay active at every policy level. This file only relaxes QUALITY rigor, never safety.
#
# This is a DELIBERATE, up-front, repo-level choice — set once, committed, visible in review.
# It is NOT a license to weaken a gate mid-task to push a bad change through: that (loosening an
# assertion, disabling a passing gate to sneak a defect) stays forbidden at every level. Pick the
# level that fits the repo's stakes (a throwaway validator ≠ a payment service), then hold it.

# --- Testing -----------------------------------------------------------------
# strict    : TDD RED→GREEN per task + Testing Trophy (default; the team's full discipline)
# pragmatic : tests required, but not strict-RED-first (write tests, keep them green)
# light     : smoke / happy-path only; no strict TDD
# none       : no tests (throwaway / side project) — the test gate is skipped entirely
TEST_POLICY=strict

# --- Lint --------------------------------------------------------------------
# on  : the Stop gate blocks on lint errors (default)
# off : lint is not enforced by the gate (formatter still runs on save)
LINT_POLICY=on

# --- CI ----------------------------------------------------------------------
# on  : this repo uses Agent Army's .github/workflows/quality.yml
# off : the repo has its own (richer) CI — don't install/rely on ours
CI_MODE=on

# --- Exact commands (written by /bootstrap after confirming they run) ---------
# These override detect.sh auto-detection. Leave commented to use auto-detection.
# /bootstrap fills these in based on your actual stack (package.json scripts,
# pyproject.toml, go.mod, Cargo.toml, etc.) after verifying each command runs.
#FMT_CMD=npm run format
#LINT_CMD=npm run lint
#TEST_CMD=npm test
